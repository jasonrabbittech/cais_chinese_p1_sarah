# ============================================
# Staging 部署 - 推送到 testing 分支時觸發
# 部署目標：
#   1. 前端 → cais_chinese_p1_sarah-staging repo (GitHub Pages)
#   2. Edge Function → Testing Supabase (gjbdqcjyliuxrnmwotvc)
#   3. 數據庫遷移 → Testing Supabase (如有 supabase/migrations/ 變更)
# ============================================

name: Deploy to Staging

on:
  push:
    branches: [testing]
    paths:
      - 'index.html'
      - 'inject-env.js'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - '.github/workflows/**'
      - '*.jpg'
      - 'favicon.svg'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: 構建前端（注入測試環境 Supabase 憑據）+ 部署到 staging repo
  deploy-frontend:
    runs-on: ubuntu-latest
    outputs:
      staging-url: https://jasonrabbittech.github.io/cais_chinese_p1_sarah-staging/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: testing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend (inject testing env)
        run: |
          echo "🔧 注入測試環境 Supabase 憑據..."
          mkdir -p dist
          node inject-env.js index.html dist/index.html
        env:
          SUPABASE_URL: https://${{ secrets.TESTING_SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.TESTING_SUPABASE_ANON_KEY }}

      - name: Copy static assets
        run: |
          cp sushi-avatar.jpg dist/ 2>/dev/null || true
          cp post-bg.jpg dist/ 2>/dev/null || true
          cp favicon.svg dist/ 2>/dev/null || true
          ls -la dist/

      - name: Deploy to staging repo (cais_chinese_p1_sarah-staging)
        run: |
          echo "🚀 部署前端到 Staging Repo..."
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy staging: ${{ github.sha }}"
          git remote add origin https://x-access-token:${{ secrets.STAGING_REPO_TOKEN }}@github.com/jasonrabbittech/cais_chinese_p1_sarah-staging.git
          git push -f origin main
          echo "✅ 前端已部署到 Staging Repo"
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  # Job 2: 部署 Edge Function 到 Testing Supabase
  deploy-edge-function:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: testing

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function to Testing Supabase
        run: |
          echo "🚀 部署 Edge Function 到 Testing Supabase..."
          supabase functions deploy su-shi-reply \
            --project-ref ${{ secrets.TESTING_SUPABASE_PROJECT_REF }}
          echo "✅ Edge Function 已部署到 Testing 環境"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Job 3: 數據庫遷移（如有 supabase/migrations/ 變更）
  deploy-database-migration:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: |
      contains(github.event.head_commit.modified, 'supabase/migrations/') ||
      contains(github.event.head_commit.added, 'supabase/migrations/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: testing

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run database migrations
        run: |
          echo "🗄️  執行數據庫遷移（Testing）..."
          supabase db push \
            --project-ref ${{ secrets.TESTING_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Job 4: 通知部署完成
  notify-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-edge-function]
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          echo "📢 Staging 部署完成"
          echo "前端: https://jasonrabbittech.github.io/cais_chinese_p1_sarah-staging/"
          echo "Edge Function: 已部署到 Testing Supabase"
          if [ "${{ needs.deploy-edge-function.result }}" == "success" ]; then
            echo "✅ 所有組件部署成功"
          else
            echo "⚠️  部分組件部署失敗，請檢查日誌"
          fi
