# ============================================
# Production 部署 - 推送到 main 分支時觸發
# ============================================
# 部署目標：
#   1. 前端 → GitHub Pages (Production URL)
#   2. Edge Function → Production Supabase (pzatgmavjvrastnumxty)
#   3. 數據庫 → Production Supabase（如有 migration）

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  # Job 1: 構建前端（注入生產環境 Supabase 憑據）+ 部署到 GitHub Pages
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend (inject production env)
        run: |
          echo "🔧 注入生產環境 Supabase 憑據..."
          mkdir -p dist
          node inject-env.js index.html dist/index.html
        env:
          SUPABASE_URL: https://${{ secrets.PROD_SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Copy static assets
        run: |
          cp sushi-avatar.jpg dist/ 2>/dev/null || true
          cp post-bg.jpg dist/ 2>/dev/null || true
          cp edge-function.ts dist/ 2>/dev/null || true
          ls -la dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 2: 部署 Edge Function 到 Production Supabase
  deploy-edge-function:
    runs-on: ubuntu-latest
    needs: deploy-frontend  # 前端部署成功後才部署 EF
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Edge Function to Production Supabase
        run: |
          echo "🚀 部署 Edge Function 到 Production Supabase..."
          echo "Project Ref: ${PROJECT_REF}"

          # 使用 Supabase Management API 部署 Edge Function
          curl -X PUT \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/functions/su-shi-reply" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"body\": $(jq -Rs '.' edge-function.ts),
              \"verify_jwt\": false
            }"

          echo "✅ Edge Function 已部署"
        env:
          PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
